<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roast Club</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero">
        <h1>Welcome to Roast Club</h1>
        <button class="signup-btn">Sign Up Now</button>
    </header>
    <section class="pricing">
        <div class="tier">
            <h2>Basic</h2>
            <p>$5/month</p>
            <ul>
                <li>1 coffee per week</li>
                <li>No shipping fees</li>
            </ul>
        </div>
        <div class="tier">
            <h2>Standard</h2>
            <p>$10/month</p>
            <ul>
                <li>3 coffees per week</li>
                <li>Free shipping</li>
            </ul>
        </div>
        <div class="tier">
            <h2>Premium</h2>
            <p>$15/month</p>
            <ul>
                <li>5 coffees per week</li>
                <li>Exclusive access to new blends</li>
            </ul>
        </div>
    </section>
    <footer class="footer">
        <a href="#">Facebook</a>
        <a href="#">Instagram</a>
        <a href="#">Twitter</a>
    </footer>
    <script src="script.js"></script>
</body>
</html>
